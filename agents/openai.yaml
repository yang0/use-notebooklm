interface:
  display_name: "Use NotebookLM"
  short_description: "Clarify intent, map request, and execute NotebookLM"
  default_prompt: "Use $use-notebooklm when the user wants NotebookLM outcomes and the work must be routed through a strict execution contract. If the task is truly underspecified, call $intent-identification first and ask at most one blocker question at a time until `intent_contract_v1` is `READY`. If the user is already specific enough for a research scan or exploratory NotebookLM pass, do not over-clarify. Treat relevant YouTube URLs as first-class, high-information-density NotebookLM sources for research and analysis. If the user already has suitable YouTube URLs, import them directly instead of invoking helper discovery skills. Map intent to explicit `notebooklm_request_v1` fields, including notebook targeting (`targetMode: existing|create`), action-specific inputs, optional language/source scope, and `sourceReadinessMode`. Accept both notebook creation JSON shapes (`id` and `notebook.id`). After any ambiguous source-add timeout, reconcile state with `$notebooklm source list --json` before retrying or failing. Allow exploratory `ask` to proceed on the ready subset only when `sourceReadinessMode` is `allow-partial-ready`; keep generation/download flows blocked on `require-all-ready`. Use helper skills only when source acquisition is missing. After mapping, invoke $notebooklm and keep collaborating until the user's need is actually completed."
